spring:
  application:
    name: tradingbackend

  data:
    mongodb:
      uri: ${MONGO_URI}
      auto-index-creation: true
#   redis
    redis:
      url: ${REDIS_URL}


server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

brevo:
  api:
    key: ${BREVO_API_KEY}
  sender:
    email: ${BREVO_SENDER_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never
