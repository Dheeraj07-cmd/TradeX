spring:
  application:
    name: tradingbackend

  servlet:
    multipart:
      max-file-size: 10MB      # Max size for a single image
      max-request-size: 30MB

  data:
    mongodb:
      uri: ${MONGO_URI}
      auto-index-creation: true
#   redis
    redis:
      url: ${REDIS_URL}

  ai:
    openai:
      api-key: ${SPRING_AI_OLLAMA_API_KEY}
      base-url: ${SPRING_AI_OLLAMA_BASE_URL}
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_MODEL}
          temperature: ${SPRING_AI_OLLAMA_TEMPERATURE}

upstox:
  api-key: ${UPSTOX_API_KEY}
  api-secret: ${UPSTOX_API_SECRET}
  redirect-uri: ${UPSTOX_REDIRECT_URI}
  access-token: ${UPSTOX_ACCESS_TOKEN}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

brevo:
  api:
    key: ${BREVO_API_KEY}
  sender:
    email: ${BREVO_SENDER_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never
