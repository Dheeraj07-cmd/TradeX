spring:
  application:
    name: tradingbackend

  data:
    mongodb:
      uri: ${MONGO_URI}
      auto-index-creation: true
#   redis
    redis:
      url: ${REDIS_URL}
  ai:
    openai:
      api-key: ${SPRING_AI_OLLAMA_API_KEY}
      base-url: ${SPRING_AI_OLLAMA_BASE_URL}
      chat:
        options:
          model: ${SPRING_AI_OLLAMA_MODEL}
          temperature: ${SPRING_AI_OLLAMA_TEMPERATURE}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

brevo:
  api:
    key: ${BREVO_API_KEY}
  sender:
    email: ${BREVO_SENDER_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never
