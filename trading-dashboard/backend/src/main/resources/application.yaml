spring:
  application:
    name: tradingbackend

  data:
    mongodb:
      uri: ${MONGO_URI}
      auto-index-creation: true
#   redis
    redis:
      url: ${REDIS_URL}
  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GEMINI_API_KEY}
        chat:
          options:
            model: ${SPRING_AI_GEMINI_MODEL}
            temperature: ${SPRING_AI_GEMINI_TEMPERATURE}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

brevo:
  api:
    key: ${BREVO_API_KEY}
  sender:
    email: ${BREVO_SENDER_EMAIL}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: never
